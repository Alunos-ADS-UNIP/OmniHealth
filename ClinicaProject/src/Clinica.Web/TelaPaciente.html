<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="TelaPaciente.css">
    <title>Minha Saúde - AgendaiFisio</title>
</head>
<body>
    <header class="navbar">
        <div class="logo">🩺 AgendaiFisio</div>
        <div class="perfil-container">
            <div class="avatar">DG</div>
        </div>
    </header>

    <h1 class="minhaSaude">Minha Saúde</h1>

    <main class="container-agendamento">
        <article class="card-moderno card-perfil-paciente">
            <span class="paciente-ativo">Paciente Ativo</span>
            <h2 class="nome-paciente">Davi Gusmão</h2>
            <p class="subtitulo-paciente">Aqui você gerencia seus atendimentos marcados.</p>
            <div id="areaAtalho" class="atalho-agendamento">
                <a href="index.html" class="btn-agendar-atalho"><span>+</span> Agendar Nova Sessão</a>
            </div>
        </article>

        <div id="listaConsultas" class="cards-grid">
            <div id="statusConsultaVazio" class="card-moderno card-vazio">
                <p class="msg-vazio">Nenhuma sessão agendada.</p>
                <a href="index.html" class="btn-agendar-main">Agendar Nova Sessão</a>
            </div>
        </div>
    </main>

    <dialog id="modalAvisoCancel" class="modal-moderno">
        <div class="modal-content">
            <div class="modal-icon">⚠️</div>
            <h3 class="modal-titulo-erro">Desmarcar Consulta?</h3>
            <p class="modal-subtitulo">Essa ação não pode ser desfeita. Deseja realmente cancelar?</p>

            <div class="botoes-duplos-stack">
                <button id="confirmarCancelamento" class="btn-confirmar-full btn-perigo">Sim, Desmarcar</button>
               <button type="button" 
                onclick="this.closest('dialog').close()" 
                class="btn-outline-full">
                Não, Manter Consulta
                </button>
            </div>
        </div>
    </dialog>

    <script src="TelaPaciente.js"></script>
</body>
</html>
